##############################################################################
# BlogMore configuration for blog.davep.org.

##############################################################################
# Locations.
content_dir: content
output: site

##############################################################################
# Main site details.
site_title: davep
site_subtitle: "Code and stuff"
site_url: "https://blog.davep.org"
site_description: "Dave Pearson's personal blog"
site_logo: /logo.jpeg
site_keywords:
  - Emacs
  - Python
  - Programming
  - Terminal
  - Textual
default_author: Dave Pearson

##############################################################################
# Building.
clean_first: true
icon_source: davep.jpeg
minify_css: true
minify_js: true
minify_html: true
page_path: "/{slug}/index.html"
clean_urls: true

##############################################################################
# Content and styling.
with_search: true
with_sitemap: true
with_read_time: true

##############################################################################
# Extra headers.
head:
  # For humans.txt (https://humanstxt.org)
  - link:
      type: "text/plain"
      rel: "author"
      href: "/humans.txt"
  - link:
      type: "application/json"
      rel: "human-json"
      href: "/human.json"

##############################################################################
# The links section in the sidebar.
links:
  - title: davep@
    url: https://davep.at/
  - title: Code
    url: https://davep.dev/
  - title: Bookmarks
    url: /bookmarks/
  - title: Photoblog
    url: https://seen-by.davep.dev/
  - title: Emacs Packages
    url: https://elisp.dev/
  - title: Python Packages
    url: https://pypi.org/user/davepearson/

##############################################################################
# The "socials" in the sidebar.
socials_title: "Connect/Consume"
socials:
  - site: bandcamp
    url: https://bandcamp.com/davep
  - site: flickr
    url: https://www.flickr.com/photos/davepearson/
  - site: github
    url: https://github.com/davep
  - site: instagram
    url: https://www.instagram.com/davepdotorg/
  - site: lastfm
    url: https://www.last.fm/user/davepdotorg
  - site: linkedin
    url: https://www.linkedin.com/in/davepdotorg/
  - site: mastodon
    url: https://fosstodon.org/@davep
  - site: npm
    url: https://www.npmjs.com/~davep.org
  - site: python
    url: https://pypi.org/user/davepearson/
  - site: reddit
    url: https://www.reddit.com/user/davepearson/
  - site: steam
    url: https://steamcommunity.com/id/davepdotorg
  - site: tiktok
    url: https://www.tiktok.com/@davepdotorg
  - site: youtube
    url: https://www.youtube.com/user/daveporg

### blogmore.yaml ends here
