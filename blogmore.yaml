##############################################################################
# BlogMore configuration for blog.davep.org.

##############################################################################
# Locations.
content_dir: content
output: site

##############################################################################
# Main site details.
site_title: davep
site_subtitle: "Code and stuff"
site_url: "https://blog.davep.org"
site_description: "Dave Pearson's personal blog"
site_logo: /logo.jpeg
site_keywords:
  - Emacs
  - Python
  - Programming
  - Terminal
  - Textual
default_author: Dave Pearson

##############################################################################
# Building.
clean_first: true
clean_urls: true
icon_source: davep.jpeg
minify_css: true
minify_html: true
minify_js: true
archive_path: "/archive/index.html"
calendar_path: "/calendar/index.html"
categories_path: "/categories/index.html"
page_n_path: "/page/{page}/index.html"
page_path: "/{slug}/index.html"
search_path: "/search/index.html"
stats_path: "/stats/index.html"
tags_path: "/tags/index.html"

##############################################################################
# Content and styling.
light_mode_code_style: default
read_time_wpm: 260
with_calendar: true
with_read_time: true
with_search: true
with_sitemap: true
with_stats: true
with_backlinks: true

##############################################################################
# Extra headers.
head:
  - link:
      type: "text/plain"
      rel: "author"
      href: "/humans.txt"
  - link:
      type: "application/json"
      rel: "human-json"
      href: "/human.json"

##############################################################################
# The links section in the sidebar.
links:
  - title: davep@
    url: https://davep.at/
  - title: Code
    url: https://davep.dev/
  - title: Bookmarks
    url: /bookmarks/
  - title: Photoblog
    url: https://seen-by.davep.dev/
  - title: Emacs Packages
    url: https://elisp.dev/
  - title: Python Packages
    url: https://pypi.org/user/davepearson/

##############################################################################
# The "socials" in the sidebar.
socials_title: "Connect/Consume"
socials:
  - site: bandcamp
    url: https://bandcamp.com/davep
  - site: flickr
    url: https://www.flickr.com/photos/davepearson/
  - site: github
    url: https://github.com/davep
  - site: instagram
    url: https://www.instagram.com/davepdotorg/
  - site: lastfm
    url: https://www.last.fm/user/davepdotorg
  - site: linkedin
    url: https://www.linkedin.com/in/davepdotorg/
  - site: mastodon
    url: https://fosstodon.org/@davep
  - site: npm
    url: https://www.npmjs.com/~davep.org
  - site: python
    url: https://pypi.org/user/davepearson/
  - site: reddit
    url: https://www.reddit.com/user/davepearson/
  - site: steam
    url: https://steamcommunity.com/id/davepdotorg
  - site: tiktok
    url: https://www.tiktok.com/@davepdotorg
  - site: youtube
    url: https://www.youtube.com/user/daveporg

### blogmore.yaml ends here
